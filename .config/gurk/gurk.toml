first_name_only = false
show_receipts = true
bell = true
colored_messages = false
default_keybindings = false
passphrase = "6414"

[user]
display_name = "rosso"

[keybindings.anywhere]
ctrl-q = "quit"
[keybindings.message_selected]
ctrl-z = "edit_message"
[keybindings.normal]
up = "select_message previous entry"
down = "select_message next entry"
alt-left = "select_channel previous"
alt-right = "select_channel next"
backspace = "delete_character previous"
ctrl-h = "delete_character previous"
end = "end_of_line"
home = "beginning_of_line"
left = "move_text previous character"
right = "move_text next character"
ctrl-left= "move_text previous word"
ctrl-right = "move_text next word"
alt-enter = "toggle_multiline"
ctrl-c = "kill_backward_line"
